<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manjung Food Explorer</title>
    
    <!-- Google Fonts: Outfit for a modern Apple-like look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Map Container -->
    <div id="map"></div>

    <!-- UI Overlay: Sidebar for Filters and Header -->
    <div class="ui-overlay">
        <header class="glass-panel">
            <h1><i class="fa-solid fa-map-location-dot"></i> Manjung Food Explorer</h1>
            <p>Cari kedai makan viral & sedap di Manjung, Perak</p>
        </header>

        <div class="filters-container glass-panel">
            <h3>Tapis Pencarian</h3>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">Semua</button>
                <button class="filter-btn" data-filter="halal"><i class="fa-solid fa-certificate"></i> Halal</button>
                <button class="filter-btn" data-filter="viral"><i class="fa-solid fa-fire"></i> Viral</button>
            </div>
            
            <h3>Kategori</h3>
            <div class="category-group">
                <select id="category-select" class="glass-select">
                    <option value="all">Semua Kategori</option>
                    <option value="Seafood">Memancing / Makanan Laut</option>
                    <option value="Cafe">Kafe / Kopi</option>
                    <option value="Melayu">Masakan Melayu</option>
                    <option value="Western">Masakan Barat</option>
                    <option value="Dessert">Pencuci Mulut / Cendol</option>
                </select>
            </div>
        </div>

        <!-- Dynamic List of visible places -->
        <div class="places-list glass-panel" id="places-list">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- Details Modal (Hidden by default) -->
    <div class="modal-backdrop" id="details-modal">
        <div class="modal-content glass-panel-premium">
            <button class="close-btn" id="close-modal"><i class="fa-solid fa-xmark"></i></button>
            <img src="" alt="Food Image" class="modal-image" id="modal-img">
            <div class="modal-body">
                <div class="modal-badges" id="modal-badges"></div>
                <h2 id="modal-title">Nama Kedai</h2>
                <div class="rating">
                    <span id="modal-rating-stars"></span>
                    <span id="modal-rating-text"></span>
                </div>
                <p class="modal-desc" id="modal-desc">Penerangan kedai makan...</p>
                
                <h3>Komen Pengguna:</h3>
                <div class="reviews-container" id="modal-reviews">
                    <!-- Reviews populated by JS -->
                </div>
                
                <div class="modal-actions">
                    <button class="action-btn primary"><i class="fa-solid fa-location-arrow"></i> Navigasi</button>
                    <button class="action-btn secondary"><i class="fa-solid fa-share-nodes"></i> Kongsi</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
